<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Gamified Dashboard</title>
    <style>
        /* 🎨 Cyberpunk Color Palette Constants & UI Reset */
        :root {
            --bg-purple: #8d00ff;       /* Main Deep Purple Background */
            --neon-mint: #00e0ba;       /* Neon Cyan for Accents & Active State */
            --vibrant-yellow: #ffcf00;  /* Yellow Gold for Streaks & Crown */
            --hot-pink: #ff007f;        /* Loud Hot Pink for Primary Action Button */
            --nav-bg: #1f003a;          /* Darker purple for the bottom nav bar */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0030 0%, var(--bg-purple) 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 📱 Simulated Smartphone Container Layout */
        .phone-container {
            width: 375px;
            height: 812px;
            background-color: #120024;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 24px 24px 90px 24px;
            box-sizing: border-box;
            border: 4px solid #2d0054;
        }

        /* 🔝 Top Header Bar: Streak Counter & Subscription Status Gating */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .streak-badge {
            color: var(--vibrant-yellow);
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(255, 207, 0, 0.6);
            letter-spacing: 0.5px;
        }

        .status-heart {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
            cursor: pointer;
            user-select: none;
        }

        /* 👤 Central Focal Point: Large Character Avatar Segment */
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            flex: 1;
            justify-content: center;
        }

        .crown-icon {
            font-size: 4rem;
            margin-bottom: -5px;
            animation: floatCrown 3s ease-in-out infinite;
        }

        .avatar-character {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(0, 224, 186, 0.3) 0%, transparent 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
        }

        .username {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.95;
        }

        /* 🎹 High-Priority Primary Action Trigger: Start Practice */
        .btn-start-practice {
            background-color: var(--hot-pink);
            color: white;
            border: none;
            padding: 22px;
            border-radius: 24px;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 0 25px var(--hot-pink);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 60px; /* Added extra space since daily mission card is removed */
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start-practice:hover {
            transform: scale(1.03);
            box-shadow: 0 0 35px var(--hot-pink);
        }

        /* 🗺️ 4-Button Bottom Navigation Bar System */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: var(--nav-bg);
            border-top: 2px solid #2d0054;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
            box-sizing: border-box;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.2s;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .nav-item:hover, .nav-item.active {
            opacity: 1;
            color: var(--neon-mint);
            transform: translateY(-2px);
        }

        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        /* Active highlight for the item corresponding to the current screen */
        .nav-item.active .nav-icon {
            filter: drop-shadow(0 0 8px var(--neon-mint));
        }

        /* Smooth Floating Animation for Cosmetic Crowns */
        @keyframes floatCrown {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- 🔝 Top Bar: Live Tracking Badges -->
        <div class="top-bar">
            <div class="streak-badge">🔥 12 DAYS STREAK</div>
            <div class="status-heart" id="statusHeart" onclick="togglePlanSimulation()">🌈💖</div>
        </div>

        <!-- 👤 Center Component: Large Profile Display Elements -->
        <div class="avatar-section">
            <div class="crown-icon">👑</div>
            <div class="avatar-character">🎹</div>
            <div class="username">@kru_ne_piano</div>
        </div>

        <!-- 🎹 High-Contrast Primary Call to Action Trigger -->
        <button class="btn-start-practice">🎹 Start Practice</button>

        <!-- 🗺️ 4-Button Bottom Navigation Dock -->
        <nav class="bottom-nav">
            <!-- 1. Scoreboard Button -->
            <button class="nav-item" onclick="navigateTo('scoreboard')">
                <div class="nav-icon">🏆</div>
                <div>Scores</div>
            </button>

            <!-- 2. Profile & Customization Button (Active on Dashboard) -->
            <button class="nav-item active" onclick="navigateTo('profile')">
                <div class="nav-icon">👤</div>
                <div>Profile</div>
            </button>

            <!-- 3. Missions Button -->
            <button class="nav-item" onclick="navigateTo('missions')">
                <div class="nav-icon">🎯</div>
                <div>Missions</div>
            </button>

            <!-- 4. Settings Button -->
            <button class="nav-item" onclick="navigateTo('settings')">
                <div class="nav-icon">⚙️</div>
                <div>Settings</div>
            </button>
        </nav>
    </div>

    <script>
        /**
         * 🔮 Interactive State Simulation Model
         * Toggles between Premium Rainbow Heart and Free Tier Heart Quotas when clicked.
         */
        function togglePlanSimulation() {
            const heartElement = document.getElementById('statusHeart');
            if (heartElement.innerText === '🌈💖') {
                heartElement.innerText = '❤️❤️❤️';
            } else {
                heartElement.innerText = '🌈💖';
            }
        }

        /**
         * 🗺️ Navigation Handler Simulation
         * Logs target actions to console. Ready to be linked to router logic later.
         */
        function navigateTo(targetScreen) {
            console.log(`Navigating to: ${targetScreen.toUpperCase()} screen.`);
            
            // UI Visual Update: Handle active navigation tab state dynamically
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // Highlight clicked item
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
